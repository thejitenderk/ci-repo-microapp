name: CI — Docker Build & Push

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/react-cicd-app

jobs:
#   # ── Job 1: Test ────────────────────────────────────────────────
#   test:
#     name: Run Tests
#     runs-on: ubuntu-latest

#     steps:
#       - name: Checkout code
#         uses: actions/checkout@v4

#       - name: Setup Node.js
#         uses: actions/setup-node@v4
#         with:
#           node-version: '20'
#           cache: 'npm'

#       - name: Install dependencies
#         run: npm install

#       - name: Run tests
#         run: npm test

  # ── Job 2: Build & Push ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'   # skip on pull_request

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: argocdacrjk.azurecr.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — two tags
        # Tag 1 : latest   → always points to the newest build on main
        # Tag 2 : sha-<id> → immutable, traceable to exact commit
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_VERSION=${{ github.sha }}
            REACT_APP_ENV=production

      - name: Print pushed tags
        run: |
          echo "✅ Pushed tags:"
          echo "   ${{ env.IMAGE_NAME }}:latest"
          echo "   ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
